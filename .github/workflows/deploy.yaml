name: Deploy to GitHub Pages

on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main

permissions:
    contents: write

jobs:
    check:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Lint
              run: npm run lint

            - name: Typecheck
              run: npx tsc --noEmit

            - name: Build
              env:
                  VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
                  VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
                  NODE_ENV: production
              run: npm run build

    deploy:
        needs: check
        if: github.event_name == 'push'
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Deploy
              env:
                  VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
                  VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
                  NODE_ENV: production
              run: |
                  git config --global user.email "awqsome@bk.ru"
                  git config --global user.name "awqsomee"
                  git remote set-url origin https://awqsomee:${{ secrets.GITHUB_TOKEN }}@github.com/vova-lera-vpiska-u/menu.git
                  npm run deploy
