name: Deploy to GitHub Pages

on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main

permissions:
    contents: write

env:
    # Single source of truth for the toolchain across jobs.
    NODE_VERSION: '24'

jobs:
    check:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up pnpm
              uses: pnpm/action-setup@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: 'pnpm'

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Lint
              run: pnpm --filter @menu/frontend lint

            - name: Typecheck
              run: pnpm --filter @menu/frontend exec tsc --noEmit

            - name: Build
              env:
                  VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
                  VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
                  NODE_ENV: production
              run: pnpm --filter @menu/frontend build

    deploy:
        needs: check
        if: github.event_name == 'push'
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up pnpm
              uses: pnpm/action-setup@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: 'pnpm'

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build
              env:
                  VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
                  VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
                  NODE_ENV: production
              run: pnpm --filter @menu/frontend build

            - name: Deploy to gh-pages
              run: |
                  git config --global user.email "awqsome@bk.ru"
                  git config --global user.name "awqsomee"
                  git remote set-url origin https://awqsomee:${{ secrets.GITHUB_TOKEN }}@github.com/vova-lera-vpiska-u/menu.git
                  pnpm --filter @menu/frontend exec gh-pages -d dist
