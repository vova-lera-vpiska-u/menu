name: Deploy Backend (Vercel)

on:
    push:
        branches:
            - main
        paths:
            - 'apps/backend/**'
            - 'packages/db/**'
            - 'pnpm-lock.yaml'
            - '.github/workflows/deploy-backend.yaml'
    pull_request:
        branches:
            - main
        paths:
            - 'apps/backend/**'
            - 'packages/db/**'
            - 'pnpm-lock.yaml'
            - '.github/workflows/deploy-backend.yaml'

env:
    # Single source of truth for the toolchain across jobs.
    NODE_VERSION: '24'

jobs:
    check:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up pnpm
              uses: pnpm/action-setup@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: 'pnpm'

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Typecheck
              run: pnpm --filter @menu/backend exec tsc --noEmit

            - name: Build (Vercel output)
              run: pnpm --filter @menu/backend exec node build.mjs

    deploy:
        needs: check
        # Deploy production only on push to main; PRs run checks only.
        if: github.event_name == 'push'
        runs-on: ubuntu-latest
        environment: production

        env:
            VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
            VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up pnpm
              uses: pnpm/action-setup@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: 'pnpm'

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Install Vercel CLI
              run: pnpm add --global vercel@latest

            - name: Link Vercel project
              run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
              working-directory: apps/backend

            - name: Build (Vercel output)
              run: node build.mjs
              working-directory: apps/backend

            - name: Deploy to Vercel (production)
              run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
              working-directory: apps/backend
